name: Validate story graph

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-story:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check story module contract
        run: node scripts/check-story-modules.mjs

      - name: Check save compatibility
        run: node scripts/check-save-compat.mjs

      - name: Validate story graph
        run: node scripts/validate-story.mjs

      - name: Audit stateful hubs
        run: node scripts/audit-stateful-hubs.mjs

      - name: Smoke test key story routes
        run: node scripts/smoke-routes.mjs

      - name: Smoke test evidence interactions
        run: node scripts/smoke-evidence.mjs

      - name: Smoke test evidence polish interactions
        run: node scripts/smoke-evidence-polish.mjs

      - name: Smoke test narrative depth routes
        run: node scripts/smoke-narrative-depth.mjs

      - name: Smoke test ending reachability
        run: node scripts/smoke-ending-reachability.mjs

      - name: Smoke test narrative clock
        run: node scripts/smoke-narrative-clock.mjs

      - name: Smoke test wrapup priority
        run: node scripts/smoke-wrapup-priority.mjs

      - name: Smoke test wrapup fusheng deduction opens
        run: node scripts/smoke-wrapup-fusheng-deduction-opens.mjs

      - name: Smoke test deduction prerequisite groups
        run: node scripts/smoke-deduction-prereq-groups.mjs

      - name: Smoke test Guanghua incomplete closure
        run: node scripts/smoke-guanghua-incomplete-closure.mjs

      - name: Smoke test early mist spoiler redaction
        run: node scripts/smoke-early-mist-spoiler-redaction.mjs

      - name: Smoke test Wuai Wanting altered packet
        run: node scripts/smoke-wuai-wanting-altered-packet.mjs

      - name: Smoke test early ending continuity
        run: node scripts/smoke-early-ending-continuity.mjs

      - name: Smoke test deduction retry no early ending
        run: node scripts/smoke-deduction-retry-no-early-ending.mjs

      - name: Smoke test Zhou jade present node
        run: node scripts/smoke-zhou-jade-present-node.mjs

      - name: Smoke test Sun fast support
        run: node scripts/smoke-sun-fast-support.mjs

      - name: Smoke test fast support heat-delay enumeration
        run: node scripts/smoke-fast-support-heat-delay-enum.mjs

      - name: Smoke test dock heat system
        run: node scripts/smoke-dock-heat-system.mjs

      - name: Smoke test solo entry route
        run: node scripts/smoke-solo-entry-route.mjs

      - name: Smoke test fusheng key gates
        run: node scripts/smoke-fusheng-key-gates.mjs

      - name: Smoke test yufang testimony
        run: node scripts/smoke-yufang-testimony.mjs

      - name: Smoke test solo dock hospital
        run: node scripts/smoke-solo-dock-hospital.mjs

      - name: Smoke test solo heat-delay outcomes
        run: node scripts/smoke-solo-heat-delay-outcomes.mjs

      - name: Smoke test solo reward ending
        run: node scripts/smoke-solo-reward-ending.mjs

      - name: Smoke test final closure flow
        run: node scripts/smoke-final-closure-flow.mjs

      - name: Smoke test legacy quality scope
        run: node scripts/smoke-legacy-quality-scope.mjs

      - name: Smoke test legacy quality text
        run: node scripts/smoke-legacy-quality-text.mjs

      - name: Smoke test wrapup no-repeat Fusheng entry
        run: node scripts/smoke-wrapup-no-repeat-fusheng-entry.mjs

      - name: Smoke test conclusion summary
        run: node scripts/smoke-conclusion-summary.mjs

      - name: Smoke test hospital flow
        run: node scripts/smoke-hospital-flow.mjs

      - name: Smoke test hospital pressure witness
        run: node scripts/smoke-hospital-pressure-witness.mjs

      - name: Smoke test hospital truth score
        run: node scripts/smoke-hospital-truth-score.mjs

      - name: Smoke test Lu procedure truth
        run: node scripts/smoke-lu-procedure-truth.mjs

      - name: Smoke test dynamic endings
        run: node scripts/smoke-dynamic-endings.mjs

      - name: Smoke test deadline deprecation
        run: node scripts/smoke-deadline-deprecation.mjs

      - name: Smoke test Fusheng entry unblock
        run: node scripts/smoke-fusheng-entry-unblock.mjs

      - name: Smoke test dock exit hospital crisis
        run: node scripts/smoke-dock-exit-hospital-crisis.mjs

      - name: Smoke test dock hide consequence
        run: node scripts/smoke-dock-hide-consequence.mjs

      - name: Smoke test dock escape choices
        run: node scripts/smoke-dock-escape-choices.mjs

      - name: Smoke test causal echo
        run: node scripts/smoke-causal-echo.mjs

      - name: Smoke test player perspective
        run: node scripts/smoke-player-perspective.mjs
