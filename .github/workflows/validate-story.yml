name: Validate story graph

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Core checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: node scripts/check-modules-manifest.mjs
      - run: node scripts/check-story-modules.mjs
      - run: node scripts/check-save-compat.mjs
      - run: node scripts/validate-story.mjs
      - run: node scripts/audit-stateful-hubs.mjs
      - run: node scripts/fuzz-story-states.mjs

  smoke:
    name: Smoke test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        script:
          - smoke-routes.mjs
          - smoke-evidence.mjs
          - smoke-evidence-polish.mjs
          - smoke-narrative-depth.mjs
          - smoke-ending-reachability.mjs
          - smoke-narrative-clock.mjs
          - smoke-wrapup-priority.mjs
          - smoke-wrapup-fusheng-deduction-opens.mjs
          - smoke-deduction-prereq-groups.mjs
          - smoke-guanghua-incomplete-closure.mjs
          - smoke-early-mist-spoiler-redaction.mjs
          - smoke-wuai-wanting-altered-packet.mjs
          - smoke-early-ending-continuity.mjs
          - smoke-deduction-retry-no-early-ending.mjs
          - smoke-zhou-jade-present-node.mjs
          - smoke-dev-mode-panel.mjs
          - smoke-sun-support-evidence-panel.mjs
          - smoke-darkroom-evidence-panel.mjs
          - smoke-fusheng-scene-evidence-panel.mjs
          - smoke-sun-fast-support.mjs
          - smoke-fast-support-heat-delay-enum.mjs
          - smoke-dock-heat-system.mjs
          - smoke-solo-entry-route.mjs
          - smoke-fusheng-key-gates.mjs
          - smoke-yufang-testimony.mjs
          - smoke-solo-dock-hospital.mjs
          - smoke-solo-heat-delay-outcomes.mjs
          - smoke-solo-reward-ending.mjs
          - smoke-final-closure-flow.mjs
          - smoke-legacy-quality-scope.mjs
          - smoke-legacy-quality-text.mjs
          - smoke-wrapup-no-repeat-fusheng-entry.mjs
          - smoke-conclusion-summary.mjs
          - smoke-hospital-flow.mjs
          - smoke-hospital-pressure-witness.mjs
          - smoke-hospital-truth-score.mjs
          - smoke-lu-procedure-truth.mjs
          - smoke-lu-evidence-panel.mjs
          - smoke-dynamic-endings.mjs
          - smoke-deadline-deprecation.mjs
          - smoke-fusheng-entry-unblock.mjs
          - smoke-dock-exit-hospital-crisis.mjs
          - smoke-dock-hide-consequence.mjs
          - smoke-dock-escape-choices.mjs
          - smoke-causal-echo.mjs
          - smoke-status-polish.mjs
          - smoke-wang-note-prereq.mjs
          - smoke-player-perspective.mjs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/${{ matrix.script }}


