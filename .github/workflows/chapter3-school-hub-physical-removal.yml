name: Chapter 3 School Hub Removal Verification

on:
  workflow_dispatch:

jobs:
  verify-chapter-3-school-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: v1_refactor

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run full check
        run: node scripts/check-story-refactor-full.mjs

      - name: Verify school hub removal is idempotent
        run: node scripts/remove-migrated-chapter3-school-hub-from-story.mjs
