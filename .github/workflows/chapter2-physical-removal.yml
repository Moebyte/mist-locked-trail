name: Chapter 2 Physical Removal

on:
  workflow_dispatch:
  push:
    branches:
      - v1_refactor
    paths:
      - .github/workflows/chapter2-physical-removal.yml

permissions:
  contents: write

jobs:
  remove-chapter-2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: v1_refactor

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run migration gate before removal
        run: node scripts/check-story-refactor.mjs

      - name: Run chapter 2 removal preflight
        run: node scripts/remove-migrated-chapter2-from-story.mjs

      - name: Physically remove migrated chapter 2 nodes
        run: node scripts/remove-migrated-chapter2-from-story.mjs --write

      - name: Run migration gate after removal
        run: node scripts/check-story-refactor.mjs

      - name: Verify removal script is idempotent after removal
        run: node scripts/remove-migrated-chapter2-from-story.mjs

      - name: Check generated diff
        run: git diff --check

      - name: Commit physical removal
        run: |
          if git diff --quiet -- src/story.js; then
            echo "No src/story.js changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/story.js
          git commit -m "Remove migrated chapter 2 nodes from story"
          git push origin HEAD:v1_refactor
