name: Story Refactor Migration Gate

on:
  workflow_dispatch:
  push:
    branches:
      - v1_refactor
  pull_request:
    branches:
      - main

jobs:
  story-refactor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run migration gate
        run: node scripts/check-story-refactor.mjs

      - name: Run chapter 2 removal dry-run
        run: node scripts/remove-migrated-chapter2-from-story.mjs
