name: Chapter 3 Chen Letter Physical Removal

on:
  workflow_dispatch:
  push:
    branches:
      - v1_refactor
    paths:
      - '.github/workflows/chapter3-chen-letter-physical-removal.yml'
      - 'scripts/remove-migrated-chapter3-chen-letter-from-story.mjs'
      - 'scripts/check-story-refactor-full.mjs'

permissions:
  contents: write

jobs:
  remove-chapter-3-chen-letter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: v1_refactor
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run full check before removal
        run: node scripts/check-story-refactor-full.mjs

      - name: Remove migrated Chen letter node from story.js
        run: node scripts/remove-migrated-chapter3-chen-letter-from-story.mjs --write

      - name: Run full check after removal
        run: node scripts/check-story-refactor-full.mjs

      - name: Show story.js diff
        run: git diff -- src/story.js

      - name: Commit physical removal
        run: |
          if git diff --quiet -- src/story.js; then
            echo "No src/story.js changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/story.js
          git commit -m "Remove migrated Chapter 3 Chen letter node from story"
          git push origin HEAD:v1_refactor
