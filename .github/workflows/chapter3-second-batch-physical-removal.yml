name: Chapter 3 Second Batch Physical Removal

on:
  workflow_dispatch:
  push:
    branches:
      - v1_refactor
    paths:
      - .github/workflows/chapter3-second-batch-physical-removal.yml

permissions:
  contents: write

jobs:
  remove-chapter-3-second-batch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: v1_refactor

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run full check before removal
        run: node scripts/check-story-refactor-full.mjs

      - name: Physically remove migrated chapter 3 second batch node
        run: node scripts/remove-migrated-chapter3-second-batch-from-story.mjs --write

      - name: Run full check after removal
        run: node scripts/check-story-refactor-full.mjs

      - name: Verify generated diff
        run: git diff --check

      - name: Commit physical removal
        run: |
          if git diff --quiet -- src/story.js; then
            echo "No src/story.js changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/story.js
          git commit -m "Remove migrated chapter 3 second batch node from story"
          git push origin HEAD:v1_refactor
