name: Apply Phase 5 Plan Documentation Update

on:
  workflow_dispatch:
  push:
    branches:
      - v1_refactor
    paths:
      - .github/workflows/apply-phase5-plan-doc-update.yml

permissions:
  contents: write

jobs:
  update-phase-5-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: v1_refactor

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Apply documentation update
        run: node scripts/apply-phase5-plan-doc-update.mjs

      - name: Verify documentation diff
        run: git diff --check

      - name: Commit documentation update
        run: |
          if git diff --quiet -- docs/v1-refactor-framework.md docs/v1-refactor-progress.md; then
            echo "No documentation changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/v1-refactor-framework.md docs/v1-refactor-progress.md
          git commit -m "Document Phase 5 remaining migration plan"
          git push origin HEAD:v1_refactor
