<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>雾锁迷踪 · 文字侦探冒险</title>
<link rel="stylesheet" href="src/styles.css">
</head>
<body>
<div id="app">
  <div id="title-screen">
    <h1>✦ 雾锁迷踪 ✦</h1>
    <div class="sub">一桩旧案 · 多条岔路 · 多种结局</div>
    <div class="tagline">民国三十七年 · 暮秋 · 上海</div>
    <button id="start-btn">开始调查</button>
    <button id="continue-btn">继续调查</button>
  </div>
  <div id="top-actions">
    <button class="tool-btn primary" id="btn-panel">线索簿</button>
    <button class="tool-btn" id="btn-graph">人物图</button>
    <button class="tool-btn" id="btn-save">存档</button>
    <button class="tool-btn" id="btn-load">读档</button>
    <button class="tool-btn" id="btn-restart">重开</button>
    <button class="tool-btn" id="btn-atmo">🎨 氛围</button>
  </div>
  <div id="log"></div>
  <div id="scene-card">
    <div id="scene-title"></div>
    <div id="scene-text"></div>
    <div id="choices"></div>
  </div>
  <div id="scroll-anchor"></div>
  <div id="status-bar">
    <span class="stat"><span class="l">📂</span><span class="v" id="s-case">未开始</span></span>
    <span class="stat"><span class="l">🔍</span><span class="v" id="s-clues">0</span></span>
    <span class="stat"><span class="l">🎒</span><span class="v" id="s-items">0</span></span>
    <span class="stat"><span class="l">📇</span><span class="v" id="s-contacts">—</span></span>
    <span class="stat"><span class="l">⏳</span><span class="v" id="s-chapter">—</span></span>
    <span class="stat"><span class="l">🕰</span><span class="v" id="s-pressure">—</span></span>
    <span class="stat"><span class="l">🌤</span><span class="v" id="s-atmo"></span></span>
  </div>
</div>
<div id="side-panel" aria-hidden="true">
  <div id="panel-mask"></div>
  <div id="panel-body">
    <div id="panel-head">
      <h2>线索簿</h2>
      <button class="tool-btn" id="btn-close-panel">关闭</button>
    </div>
    <div id="panel-content"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<!-- 推理弹窗 -->
<div id="deduction-modal" style="display:none;position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.7);align-items:center;justify-content:center;padding:20px">
  <div style="background:#0f0f1e;border:1px solid #3a3a58;border-radius:12px;max-width:500px;width:100%;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.5)">
    <h3 id="deduc-title" style="color:#c8a87c;font-size:17px;margin-bottom:16px;letter-spacing:2px">推理</h3>
    <div class="deduc-question" style="color:#d0d0da;font-size:15px;line-height:1.8;margin-bottom:16px"></div>
    <div class="deduc-options" style="display:flex;flex-direction:column;gap:8px;margin-bottom:12px"></div>
    <button id="close-deduction" class="tool-btn" style="margin-top:8px">暂不推理</button>
  </div>
</div>

<!-- 关系图弹窗 -->
<div id="graph-panel" style="display:none;position:fixed;inset:0;z-index:45;background:rgba(0,0,0,.6);align-items:center;justify-content:center;padding:20px">
  <div style="background:#0d0d1a;border:1px solid #303052;border-radius:12px;max-width:480px;width:100%;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.5)">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <h3 style="color:#c8a87c;font-size:17px;letter-spacing:2px;font-weight:normal">人物关系图</h3>
      <button id="close-graph" class="tool-btn">关闭</button>
    </div>
    <svg class="graph-svg" viewBox="0 0 400 300" style="width:100%;height:auto;background:#0a0a14;border-radius:8px"></svg>
    <div id="graph-mask" style="display:none"></div>
  </div>
</div>
<script src="src/engine.js"></script>
<script src="src/story.js"></script>
<script src="src/main.js"></script>
<script src="src/v0.6.1-fixes.js"></script>
<script src="src/v0.6.2-evidence.js"></script>
<script src="src/v0.6.3-evidence-polish.js"></script>
</body>
</html>
